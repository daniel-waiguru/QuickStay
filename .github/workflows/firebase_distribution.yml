name: Firebase App Distribution

on:
  push:
    branches:
      [ main ]

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties file
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: echo $LOCAL_PROPERTIES > local.properties

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Generate changelog
        run: |
          PREV="${{ github.event.before }}"
          if [ -z "$PREV" ] || [ "$PREV" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$PREV" 2>/dev/null; then
            RANGE="-10"
          else
            RANGE="$PREV..${{ github.sha }}"
          fi
          {
            echo "Build 1.0.${{ github.run_number }} (${GITHUB_SHA::7})"
            echo ""
            echo "Changelog:"
            git log $RANGE --no-merges --pretty=format:'- %s (%h)'
          } > "$RUNNER_TEMP/release_notes.txt"
          cat "$RUNNER_TEMP/release_notes.txt"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: >
          ./gradlew assembleRelease
          -PversionCode=${{ github.run_number }}
          -PversionName=1.0.${{ github.run_number }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotesFile: ${{ runner.temp }}/release_notes.txt
